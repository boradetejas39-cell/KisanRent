<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KisanRent – Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-inner">
            <a href="home.html" class="navbar-brand">
                <img src="blablabla.jfif" alt="KisanRent Logo" class="brand-logo"> KisanRent
            </a>
            <div class="navbar-links">
                <a href="home.html" class="nav-link">Home</a>
                <a href="explore.html" class="nav-link">Explore</a>
                <a href="subscription.html" class="nav-link">Plans</a>
            </div>
            <div class="navbar-right">
                <a href="index.html" class="nav-btn-login">Sign In</a>
                <a href="signup.html" class="nav-btn-list">Sign Up</a>
            </div>
        </div>
    </nav>

    <!-- Auth Page -->
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-hero">
                <div class="auth-logo">🚜</div>
                <h1>KisanRent</h1>
                <p>Rent agricultural equipment with ease</p>
            </div>
            <div class="auth-form">
                <h2>Welcome Back</h2>
                <p class="subtitle">Sign in to continue renting farm equipment</p>

                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <div class="form-input-icon">
                        <span class="icon">✉</span>
                        <input class="form-input" type="email" placeholder="you@example.com">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="form-input-icon">
                        <span class="icon">🔒</span>
                        <input class="form-input" type="password" placeholder="Enter your password">
                    </div>
                </div>

                <div class="forgot-link">
                    <a href="#">Forgot Password?</a>
                </div>

                <div class="checkbox-row">
                    <span class="checkbox checked"></span>
                    <span class="checkbox-label">Remember me</span>
                </div>

                <a href="home.html" class="btn btn-primary">Sign In</a>

                <div class="auth-divider"><span>or continue with</span></div>

                <div class="social-btns">
                    <a class="social-btn" href="home.html"><span>G</span> Google</a>
                    <a class="social-btn" href="home.html"><span>📱</span> Phone</a>
                </div>

                <div class="auth-footer">
                    Don't have an account? <a href="signup.html">Sign Up</a>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
